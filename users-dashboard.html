<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Digital Tools Hub - Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1220;
    color: #e2e8f0;
}

/* HEADER */
header {
    background: #111827;
    padding: 18px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

/* LAYOUT */
.container {
    display: grid;
    grid-template-columns: 250px 1fr 300px;
    height: calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar {
    background: #0f172a;
    padding: 15px;
    overflow-y: auto;
    border-right: 1px solid #1e293b;
}

.tool {
    padding: 10px;
    margin: 6px 0;
    background: #1e293b;
    border-radius: 6px;
    cursor: pointer;
}

.tool:hover {
    background: #334155;
}

/* MAIN */
.main {
    padding: 15px;
    display: flex;
    flex-direction: column;
}

textarea {
    width: 100%;
    height: 120px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #1e293b;
    color: white;
}

button {
    margin-top: 10px;
    padding: 10px;
    background: #3b82f6;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

/* OUTPUT */
.output {
    margin-top: 15px;
    padding: 15px;
    background: #111827;
    border-radius: 8px;
    height: 100%;
    overflow-y: auto;
}

/* RIGHT PANEL */
.right {
    background: #0f172a;
    padding: 15px;
    border-left: 1px solid #1e293b;
}

.card {
    background: #1e293b;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
}

.badge {
    padding: 4px 8px;
    border-radius: 5px;
    font-size: 12px;
}

.free { background: #64748b; }
.pro { background: #22c55e; }
.premium { background: #f59e0b; }

</style>
</head>

<body>

<header>AI Digital Tools Hub - User Dashboard</header>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
    <h3>AI Tools</h3>

    <div class="tool" onclick="setTool('ai-blog-article-writer')">Blog Writer</div>
    <div class="tool" onclick="setTool('ai-humanizer')">AI Humanizer</div>
    <div class="tool" onclick="setTool('grammar-checker')">Grammar Checker</div>
    <div class="tool" onclick="setTool('paraphrase-writer')">Paraphraser</div>
    <div class="tool" onclick="setTool('seo-keyword-generator')">SEO Keywords</div>
    <div class="tool" onclick="setTool('youtube-script')">YouTube Script</div>
    <div class="tool" onclick="setTool('instagram-caption')">Instagram Caption</div>
    <div class="tool" onclick="setTool('product-copy')">Product Copy</div>
    <div class="tool" onclick="setTool('ad-copy')">Ad Copy</div>
</div>

<!-- MAIN -->
<div class="main">

<h3 id="currentTool">Select a Tool</h3>

<textarea id="prompt" placeholder="Enter your prompt here..."></textarea>

<button onclick="generate()">Generate AI Output</button>

<div class="output" id="output">AI output will appear here...</div>

</div>

<!-- RIGHT PANEL -->
<div class="right">

<div class="card">
<h4>User Plan</h4>
<p id="plan">Free</p>
</div>

<div class="card">
<h4>Credits</h4>
<p id="credits">20</p>
</div>

<div class="card">
<h4>History</h4>
<div id="history">Loading...</div>
</div>

</div>

</div>

<script>

const API = "https://YOUR-HF-SPACE.hf.space"; // change this
let token = localStorage.getItem("token");
let selectedTool = "";

function setTool(tool) {
    selectedTool = tool;
    document.getElementById("currentTool").innerText = "Tool: " + tool;
}

async function generate() {

    const prompt = document.getElementById("prompt").value;

    const res = await fetch(API + "/generate", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
            tool: selectedTool,
            prompt: prompt
        })
    });

    const data = await res.json();

    document.getElementById("output").innerText = data.result;
    loadProfile();
    loadHistory();
}

async function loadProfile() {
    const res = await fetch(API + "/me", {
        headers: { "Authorization": "Bearer " + token }
    });

    const data = await res.json();

    document.getElementById("plan").innerText = data.plan;
    document.getElementById("credits").innerText = data.credits;
}

async function loadHistory() {
    const res = await fetch(API + "/history", {
        headers: { "Authorization": "Bearer " + token }
    });

    const data = await res.json();

    let html = "";
    data.history.forEach(h => {
        html += `<p>${h.tool}</p>`;
    });

    document.getElementById("history").innerHTML = html;
}

loadProfile();
loadHistory();

</script>

</body>
</html>
