<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>User Dashboard | AI Digital Tools Hub</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:Arial,Helvetica,sans-serif;
background:#0b1020;
color:#fff;
}
.sidebar{
width:250px;
height:100vh;
position:fixed;
left:0;
top:0;
background:#121a33;
padding:25px;
overflow:auto;
}
.logo{
font-size:24px;
font-weight:700;
color:#22c55e;
margin-bottom:30px;
}
.sidebar a{
display:block;
padding:12px;
margin-bottom:10px;
border-radius:10px;
background:#182240;
color:#fff;
text-decoration:none;
}
.sidebar a:hover{
background:#22c55e;
color:#08120d;
}
.main{
margin-left:250px;
padding:30px;
}
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}
.card{
background:#121a33;
padding:20px;
border-radius:18px;
}
.card h3{
font-size:18px;
margin-bottom:10px;
}
.big{
font-size:34px;
font-weight:700;
color:#4ade80;
}
.panel{
background:#121a33;
padding:25px;
border-radius:18px;
margin-bottom:25px;
}
select,input,textarea,button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:10px;
font-size:16px;
}
textarea{
height:180px;
resize:none;
}
button{
background:#22c55e;
font-weight:700;
cursor:pointer;
}
button:hover{
opacity:.9;
}
.output{
white-space:pre-wrap;
margin-top:20px;
padding:15px;
background:#182240;
border-radius:12px;
min-height:120px;
}
@media(max-width:768px){
.sidebar{
position:relative;
width:100%;
height:auto;
}
.main{
margin-left:0;
padding:15px;
}
}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">AI Tools Hub</div>

<a href="index.html">Home</a>
<a href="#">Dashboard</a>
<a href="#">My Credits</a>
<a href="#">Upgrade Plan</a>
<a href="#">History</a>
<a href="#">Logout</a>
</div>

<div class="main">

<h1>Welcome Back 👋</h1>
<br>

<div class="cards">
<div class="card">
<h3>Credits</h3>
<div class="big">1250</div>
</div>

<div class="card">
<h3>Plan</h3>
<div class="big">Pro</div>
</div>

<div class="card">
<h3>Total Uses</h3>
<div class="big">94</div>
</div>

<div class="card">
<h3>Status</h3>
<div class="big">Active</div>
</div>
</div>

<div class="panel">
<h2>Use AI Tool</h2>

<select id="tool">
<option value="ai-blog-article-writer">AI Blog Writer</option>
<option value="grammar-checker">Grammar Checker</option>
<option value="keywords-research-generator">Keyword Research</option>
<option value="meta-description-writer">Meta Description</option>
<option value="youtube-hook-pro">YouTube Hooks</option>
<option value="instagram-caption-generator">Instagram Captions</option>
</select>

<textarea id="prompt" placeholder="Enter your prompt..."></textarea>

<button onclick="runTool()">Generate</button>

<div class="output" id="output">Your AI output will appear here...</div>

</div>

</div>

<script>
const API_URL = "https://YOUR-HF-SPACE.hf.space/generate";

async function generate(){
const tool = document.getElementById("tool").value;
const prompt = document.getElementById("prompt").value;
const output = document.getElementById("output");

output.innerHTML = "Generating...";

try{
const res = await fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
tool:tool,
prompt:prompt
})
});

const data = await res.json();

output.innerHTML = data.result || "No response";

}catch(err){
output.innerHTML = "Error connecting backend.";
}
}
  <script>
const API_URL = "https://fiaz75-ai-digital-tools-hub-api.hf.space/generate";

/**
 * Universal AI tool executor
 */
async function runTool() {

const tool = document.getElementById("tool").value;
const prompt = document.getElementById("prompt").value;
const output = document.getElementById("output");

if (!prompt.trim()) {
output.innerHTML = "⚠️ Please enter input first.";
return;
}

output.innerHTML = "⏳ Generating...";

try {

const res = await fetch(API_URL, {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
tool: tool,
prompt: prompt
})
});

const data = await res.json();

output.innerHTML = data.result || "No response received.";

} catch (error) {

output.innerHTML = "❌ API connection failed.";

}

}
const TOOL_MAP = {
  "ai-blog-article-writer": "AI Blog Writer",
  "grammar-checker": "Grammar Checker",
  "keywords-research-generator": "Keyword Research",
  "meta-description-writer": "Meta Description",
  "youtube-hook-pro": "YouTube Hook Generator",
  "instagram-caption-generator": "Instagram Caption Generator",
  "ad-copy-generator": "Ad Copy Generator",
  "product-copy-generator": "Product Copy Generator"
};
  
</script>
</script>

</body>
</html>
