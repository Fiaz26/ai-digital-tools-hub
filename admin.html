<!-- File: admin.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | AI Tools SaaS</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>

<body>

<header>
  <div class="container nav">
    <div class="logo">AI Tools Admin</div>

    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/dashboard.html">Dashboard</a>
      <a href="/pricing.html">Pricing</a>
      <a href="/login.html">Logout</a>
    </div>
  </div>
</header>

<section class="dashboard" id="adminPage">

  <div class="container">

    <div class="topbar">

      <div class="stat">
        Total Users: <span id="usersCount">0</span>
      </div>

      <div class="stat">
        Total Requests: <span id="reqCount">0</span>
      </div>

      <button class="btn btn-danger" onclick="logout()">Logout</button>

    </div>

    <!-- USERS -->
    <div class="card" style="margin-bottom:20px;">
      <h3>Users Overview</h3>
      <div id="users" class="output-box">
        Loading users...
      </div>
    </div>

    <!-- PAYMENTS (optional future use) -->
    <div class="card">
      <h3>System Status</h3>
      <div class="output-box">
        AI SaaS Backend Connected ✔
        <br><br>
        Groq API Ready ✔
        <br><br>
        Credit System Active ✔
      </div>
    </div>

  </div>

</section>

<script src="/assets/app.js"></script>

</body>
</html>
