<!DOCTYPE html>
<!-- File Name: admin.html -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Dashboard | AI Digital Tools Hub</title>

<link rel="stylesheet" href="assets/style.css">

<style>
.admin-layout{
display:grid;
grid-template-columns:260px 1fr;
min-height:100vh;
}

.sidebar{
background:#0f172a;
padding:24px;
border-right:1px solid rgba(255,255,255,.08);
}

.brand{
font-size:24px;
font-weight:800;
color:#22c55e;
margin-bottom:24px;
}

.nav a{
display:block;
padding:12px 14px;
margin-bottom:10px;
border-radius:10px;
color:#dbeafe;
}

.nav a:hover{
background:rgba(34,197,94,.12);
color:#22c55e;
}

.main{
padding:28px;
}

.title{
font-size:32px;
font-weight:800;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
margin-bottom:20px;
}

.card{
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
padding:20px;
border-radius:18px;
}

.card h3{
margin-bottom:10px;
}

.table{
background:#0f172a;
border:1px solid rgba(255,255,255,.08);
border-radius:18px;
padding:20px;
margin-top:20px;
}

.row{
padding:10px 0;
border-bottom:1px solid rgba(255,255,255,.06);
font-size:14px;
color:#dbeafe;
}

button{
margin-top:10px;
padding:10px 14px;
border:none;
border-radius:10px;
background:#22c55e;
color:#06110a;
font-weight:700;
cursor:pointer;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid rgba(255,255,255,.08);
background:#0f172a;
color:white;
margin-top:8px;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="admin-layout">

<!-- SIDEBAR -->
<div class="sidebar">

<div class="brand">AI Admin</div>

<div class="nav">
<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
<a href="pricing.html">Pricing</a>
<a href="#" onclick="logout()">Logout</a>
</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="title">Admin Dashboard</div>

<div class="grid">

<div class="card">
<h3>Total Users</h3>
<p id="totalUsers">Loading...</p>
</div>

<div class="card">
<h3>Total Payments</h3>
<p id="totalPayments">Loading...</p>
</div>

<div class="card">
<h3>System Status</h3>
<p>API Connected: <span style="color:#22c55e;">Active</span></p>
</div>

</div>

<!-- USERS SECTION -->
<div class="card">
<h3>Users List</h3>
<div id="usersList">Loading users...</div>
</div>

<!-- PAYMENTS SECTION -->
<div class="card">
<h3>Payment Requests</h3>
<div id="paymentsList">Loading payments...</div>
</div>

<!-- ADD CREDITS -->
<div class="card">
<h3>Add Credits to User</h3>

<label>User ID</label>
<input type="number" id="userId">

<label>Credits</label>
<input type="number" id="credits">

<button onclick="addCredits()">Add Credits</button>

</div>

</div>

</div>

<script src="assets/app.js"></script>

<script>

const API = API_URL;

async function loadAdminData(){

try{

const users = await fetch(API + "/admin/users").then(r=>r.json());
const payments = await fetch(API + "/admin/payments").then(r=>r.json());

document.getElementById("totalUsers").innerText = users.length;
document.getElementById("totalPayments").innerText = payments.length;

// USERS
document.getElementById("usersList").innerHTML =
users.map(u=>`
<div class="row">
ID: ${u.id} | ${u.email} | Credits: ${u.credits}
</div>
`).join("");

// PAYMENTS
document.getElementById("paymentsList").innerHTML =
payments.map(p=>`
<div class="row">
User: ${p.user_id} | $${p.amount} | ${p.method} | ${p.status}
</div>
`).join("");

}catch(err){

document.getElementById("usersList").innerText = "Error loading data";
document.getElementById("paymentsList").innerText = "Error loading data";

}

}

async function addCredits(){

const user_id = document.getElementById("userId").value;
const credits = document.getElementById("credits").value;

if(!user_id || !credits){
alert("Enter values");
return;
}

await fetch(API + "/admin/add-credits",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
user_id:user_id,
credits:credits
})
});

alert("Credits added");
loadAdminData();

}

function logout(){
localStorage.removeItem("token");
window.location.href="index.html";
}

loadAdminData();

</script>

</body>
</html>
