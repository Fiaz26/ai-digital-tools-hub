
<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<style>
body{font-family:Arial;background:#0b1020;color:white;padding:20px}
.card{background:#121a33;padding:15px;margin:10px;border-radius:10px}
button{padding:8px 12px}
</style>
</head>
<body>

<h1>Admin Dashboard</h1>

<div class="card">
<h3>Users</h3>
<div id="users"></div>
</div>

<div class="card">
<h3>Payments</h3>
<div id="payments"></div>
</div>

<script>

const API = "https://fiaz75-ai-digital-tools-hub-api.hf.space";

async function loadUsers(){
const res = await fetch(API + "/admin/users");
const data = await res.json();

document.getElementById("users").innerHTML =
data.map(u => `
<p>${u.email} - Credits: ${u.credits}</p>
`).join("");
}

async function loadPayments(){
const res = await fetch(API + "/admin/payments");
const data = await res.json();

document.getElementById("payments").innerHTML =
data.map(p => `
<p>User: ${p.user_id} | ${p.amount} | ${p.method} | ${p.status}</p>
`).join("");
}

loadUsers();
loadPayments();

</script>

</body>
</html>
